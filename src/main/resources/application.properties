server.port=8083

# Database Configuration
spring.datasource.name=imooc_mall_datasource
spring.datasource.url=jdbc:mysql://localhost:3306/imooc_mall?useUnicode=true&characterEncoding=utf8&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# MyBatis Configuration
mybatis.mapper-locations=classpath:mappers/*.xml
spring.main.allow-bean-definition-overriding=true

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=

# File Upload Configuration
file.upload.dir=D:/upload-file/
file.upload.ip=127.0.0.1

# Mail Configuration (SMTP)
spring.mail.host=smtp.qq.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@qq.com}
spring.mail.password=${MAIL_PASSWORD:your-password}
spring.mail.default-encoding=utf-8
spring.mail.properties.mail.smtp.auth=true
